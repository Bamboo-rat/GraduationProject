# ===============================
# Production Configuration for Render.com
# ===============================

spring.application.name=backend
server.port=${PORT:8080}

# ===============================
# DATASOURCE (PostgreSQL on Render)
# ===============================
# Render injects DATABASE_URL in format: postgresql://user:pass@host:port/db
spring.datasource.url=${DATABASE_URL}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate DDL (use 'validate' in production after initial setup)
spring.jpa.hibernate.ddl-auto=update

# Performance: Disable SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool Optimization for Free Tier (512MB RAM)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.idle-timeout=180000

# Transaction Isolation
spring.jpa.properties.hibernate.connection.isolation=4

# Optimistic Locking
spring.jpa.properties.javax.persistence.lock.timeout=5000

# ===============================
# REDIS CONFIGURATION
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=10000
spring.data.redis.jedis.pool.max-active=5
spring.data.redis.jedis.pool.max-idle=3
spring.data.redis.jedis.pool.min-idle=1

# ===============================
# KEYCLOAK CONFIGURATION
# Note: For free tier, consider using Custom JWT only
# ===============================
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8081}
keycloak.realm=${KEYCLOAK_REALM:savefood}
keycloak.resource=${KEYCLOAK_RESOURCE:backend-fs}
keycloak.customer.client-secret=${KEYCLOAK_CLIENT_SECRET:placeholder}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_AUTH_SERVER_URL}/realms/${KEYCLOAK_REALM}

# ===============================
# CUSTOM JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=7200000
jwt.refresh-token-expiration=604800000

# ===============================
# SENDGRID CONFIGURATION
# ===============================
sendgrid.api-key=${SENDGRID_API_KEY}
sendgrid.from-email=${SENDGRID_FROM_EMAIL}
sendgrid.from-name=${SENDGRID_FROM_NAME:SaveFood}

# ===============================
# CLOUDINARY CONFIGURATION
# ===============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

cloudinary.folder.business-licenses=business-licenses
cloudinary.folder.food-safety-certificates=food-safety-certificates
cloudinary.folder.banner=banner
cloudinary.folder.products=products
cloudinary.folder.avatar-customer=avatar-customer
cloudinary.folder.avatar-admin=avatar-admin
cloudinary.folder.supplier-logo=supplier-logo

# ===============================
# APPLICATION CONFIGURATION
# ===============================
app.frontend-url=${FRONTEND_URL:http://localhost:3001}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3001,http://localhost:3002}

# ===============================
# PAYOS CONFIGURATION
# ===============================
payos.client-id=${PAYOS_CLIENT_ID:af093696-9d94-4744-8976-cb27487086b6}
payos.api-key=${PAYOS_API_KEY:2ed881cf-6ec8-4576-ab94-6fdd72e41bbb}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:63079253be4ad6ee6bc34267a70e1b6614017f0cd42831c61e0e59999337bd0c}
payos.base-url=https://api-merchant.payos.vn
payos.return-url=${FRONTEND_URL}/mobile/payos/return
payos.cancel-url=${FRONTEND_URL}/mobile/payos/cancel

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.root=WARN
logging.level.com.example.backend=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# File logging (Render provides log aggregation)
logging.file.name=/tmp/savefood.log
logging.file.max-size=10MB
logging.file.max-history=3

# ===============================
# PERFORMANCE OPTIMIZATIONS
# ===============================
# Disable DevTools
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Disable Actuator endpoints (enable only health check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Tomcat Thread Pool (reduce for low memory)
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=200

# Connection timeout
server.tomcat.connection-timeout=20000

# Enable response compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# ===============================
# SCHEDULER CONFIGURATION
# ===============================
# Disable schedulers on free tier (service sleeps)
# Use external cron jobs to trigger maintenance endpoints
scheduler.enabled=${SCHEDULER_ENABLED:false}

# ===============================
# CACHE CONFIGURATION
# ===============================
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ===============================
# SECURITY HEADERS
# ===============================
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
